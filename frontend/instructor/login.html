<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login | FORESTRY TRAINING INSTITUTE OLMOTONYI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-primary: #2d5016;
            --forest-secondary: #8b4513;
            --forest-accent: #ffa500;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            background: var(--forest-primary);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .login-body {
            padding: 2rem;
        }
        .btn-forest {
            background: var(--forest-primary);
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            width: 100%;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-forest:hover {
            background: #1a3a0a;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .alert {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h3><img src="/static/images/logo.png" height="32" alt="" style="vertical-align: middle;"> FORESTRY INSTITUTE</h3>
            <p class="mb-0">Teacher Portal</p>
        </div>
        <div class="login-body">
            <div class="alert alert-danger" id="errorAlert" role="alert"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" required 
                           placeholder="teacher@forestry.edu">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required 
                           placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-forest mb-3">
                    <i class="fas fa-sign-in-alt me-2"></i> Login
                </button>
                <div class="text-center">
                    <a href="/" class="text-muted small">← Back to Home</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password, role: 'teacher'})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('role', data.role);
                    if (data.must_change_password) {
                        window.location.href = '/admin/change-password.html';
                    } else {
                        window.location.href = '/instructor/dashboard.html';
                    }
                } else {
                    errorAlert.textContent = data.detail || 'Login failed';
                    errorAlert.style.display = 'block';
                }
            } catch (error) {
                errorAlert.textContent = 'Connection error. Please try again.';
                errorAlert.style.display = 'block';
            }
        });
    </script>
</body>
</html>
