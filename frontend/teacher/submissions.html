<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Submissions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/supabase-init.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">Submissions</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/teacher/dashboard.html">Dashboard</a>
                <a class="nav-link text-white" href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div id="submissionsList"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let token = null;
        (async () => {
            const sb = await requireAuth();
            token = (await sb.auth.getSession()).data.session?.access_token;
        })();

        const urlParams = new URLSearchParams(window.location.search);
        const assignmentId = urlParams.get('assignment_id');
        
        async function loadSubmissions() {
            const response = await fetch(`/api/teacher/submissions/${assignmentId}`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (response.ok) {
                const submissions = await response.json();
                document.getElementById('submissionsList').innerHTML = submissions.map(s => `
                    <div class="card mb-3">
                        <div class="card-body">
                            <h6>${s.student_name}</h6>
                            <p>Grade: ${s.grade || 'Not graded'}</p>
                            <p>${s.feedback || 'No feedback'}</p>
                            <p><small>Submitted: ${new Date(s.submitted_at).toLocaleString()}</small></p>
                            <button class="btn btn-primary btn-sm" onclick="downloadSubmission(${s.id})">Download</button>
                            <button class="btn btn-warning btn-sm" onclick="gradeSubmission(${s.id})">${s.grade ? 'Update Grade' : 'Grade'}</button>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        async function gradeSubmission(id) {
            const grade = prompt('Enter grade:');
            const feedback = prompt('Enter feedback:');
            if (grade) {
                const response = await fetch(`/api/teacher/submissions/${id}/grade`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                    body: JSON.stringify({grade: grade, feedback: feedback})
                });
                if (response.ok) {
                    alert('Grade submitted! Student will be notified.');
                    loadSubmissions();
                }
            }
        }
        
        async function downloadSubmission(id) {
            const response = await fetch(`/api/teacher/submissions/download/${id}`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (response.ok) {
                const blob = await response.blob();
                const disposition = response.headers.get('Content-Disposition');
                const match = disposition && disposition.match(/filename="?(.+?)"?$/);
                const fileName = match ? match[1] : `submission_${id}`;
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }
        }
        
        if (assignmentId) loadSubmissions();
    </script>
</body>
</html>
