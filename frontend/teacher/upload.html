<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/supabase-init.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">Upload Assignment</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/teacher/dashboard.html">Dashboard</a>
                <a class="nav-link text-white" href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div id="error" class="alert alert-danger d-none"></div>
        <div id="success" class="alert alert-success d-none"></div>
        <form id="uploadForm">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" id="title" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Class Name</label>
                <input type="text" class="form-control" id="className" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="description"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Deadline (optional)</label>
                <input type="datetime-local" class="form-control" id="deadline">
            </div>
            <div class="mb-3">
                <label class="form-label">File (PDF, Word, Excel)</label>
                <input type="file" class="form-control" id="file" accept=".pdf,.docx,.xlsx,.doc,.xls" required>
            </div>
            <button type="submit" class="btn btn-success">Upload Assignment</button>
        </form>
    </div>
    <script>
        let token = null;
        (async () => {
            const sb = await requireAuth();
            token = (await sb.auth.getSession()).data.session?.access_token;
        })();

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');
            
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('class_name', document.getElementById('className').value);
            formData.append('description', document.getElementById('description').value);
            
            const deadline = document.getElementById('deadline').value;
            if (deadline) {
                formData.append('deadline', deadline.replace('T', ' ') + ':00');
            }
            
            formData.append('file', document.getElementById('file').files[0]);
            
            try {
                const response = await fetch('/api/teacher/assignments', {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${token}`},
                    body: formData
                });
                
                if (response.ok) {
                    successDiv.textContent = 'Assignment uploaded successfully!';
                    successDiv.classList.remove('d-none');
                    document.getElementById('uploadForm').reset();
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.detail;
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                errorDiv.textContent = 'Upload failed. Please try again.';
                errorDiv.classList.remove('d-none');
            }
        });
        
        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }
    </script>
</body>
</html>
