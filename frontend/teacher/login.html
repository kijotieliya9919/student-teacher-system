<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/supabase-init.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Teacher Login</h3>
                        <div id="error" class="alert alert-danger d-none"></div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Login</button>
                        </form>
                        <div class="mt-3 text-center">
                            <a href="/">Back to Home</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorAlert = document.getElementById('errorAlert') || document.getElementById('error');
            if (errorAlert) {
                errorAlert.style.display = 'none';
                errorAlert.classList.add('d-none');
            }
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const result = await login(email, password, 'teacher');
                if (result.must_change_password) {
                    window.location.href = '/admin/change-password.html';
                } else {
                    window.location.href = '/teacher/dashboard.html';
                }
            } catch (err) {
                if (errorAlert) {
                    errorAlert.textContent = err.message || 'Login failed';
                    errorAlert.style.display = 'block';
                    errorAlert.classList.remove('d-none');
                } else {
                    alert(err.message || 'Login failed');
                }
            }
        });
    </script>
</body>
</html>
