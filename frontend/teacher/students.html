<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/supabase-init.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">View Students</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/teacher/dashboard.html">Dashboard</a>
                <a class="nav-link text-white" href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="mb-3">
            <label class="form-label">Filter by Class</label>
            <input type="text" class="form-control" id="classFilter" onkeyup="loadStudents()">
        </div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Name</th>
                    <th>Class</th>
                </tr>
            </thead>
            <tbody id="studentsTable"></tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let token = null;
        (async () => {
            const sb = await requireAuth();
            token = (await sb.auth.getSession()).data.session?.access_token;
        })();

        async function loadStudents() {
            const className = document.getElementById('classFilter').value;
            const response = await fetch(`/api/teacher/students?class_name=${className}`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (response.ok) {
                const students = await response.json();
                document.getElementById('studentsTable').innerHTML = students.map(s => `
                    <tr>
                        <td>${s.email}</td>
                        <td>${s.full_name}</td>
                        <td>${s.class_name}</td>
                    </tr>
                `).join('');
            }
        }
        
        function logout() {
            logout();
            return false;
        }
        
        loadStudents();
    </script>
</body>
</html>
