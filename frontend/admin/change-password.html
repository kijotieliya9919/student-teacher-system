<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/supabase-init.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Change Password</h3>
                        <div id="error" class="alert alert-danger d-none"></div>
                        <div id="success" class="alert alert-success d-none"></div>
                        <form id="changePasswordForm">
                            <div class="mb-3">
                                <label class="form-label">Old Password</label>
                                <input type="password" class="form-control" id="oldPassword" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input type="password" class="form-control" id="newPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Change Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let token = null;
        (async () => {
            const sb = await requireAuth();
            token = (await sb.auth.getSession()).data.session?.access_token;
        })();
        
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');
            
            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                    body: JSON.stringify({
                        old_password: document.getElementById('oldPassword').value,
                        new_password: document.getElementById('newPassword').value
                    })
                });
                
                if (response.ok) {
                    successDiv.textContent = 'Password changed successfully! Redirecting...';
                    successDiv.classList.remove('d-none');
                    const params = new URLSearchParams(window.location.search);
                    const role = params.get('role') || 'admin';
                    const dashboards = {admin: '/admin/dashboard.html', teacher: '/instructor/dashboard.html', student: '/student/dashboard.html'};
                    setTimeout(() => window.location.href = dashboards[role] || '/admin/dashboard.html', 1500);
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.detail;
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                errorDiv.textContent = 'Password change failed.';
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
