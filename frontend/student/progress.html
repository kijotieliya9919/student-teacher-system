<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Progress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/supabase-init.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info">
        <div class="container">
            <a class="navbar-brand" href="#">My Progress</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/student/dashboard.html">Dashboard</a>
                <a class="nav-link text-white" href="/student/assignments.html">Assignments</a>
                <a class="nav-link text-white" href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Progress Summary</h5>
                        <div id="progressStats"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>My Submissions</h5>
                        <div id="submissionsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let token = null;
        (async () => {
            const sb = await requireAuth();
            token = (await sb.auth.getSession()).data.session?.access_token;
            loadProgress();
            loadSubmissions();
        })();
        
        async function loadProgress() {
            const response = await fetch('/api/student/progress', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (response.ok) {
                const data = await response.json();
                document.getElementById('progressStats').innerHTML = `
                    <p>Total Assignments: ${data.total_assignments}</p>
                    <p>Submitted: ${data.submitted}</p>
                    <p>Graded: ${data.graded}</p>
                    <p>Pending: ${data.pending}</p>
                    <div class="progress">
                        <div class="progress-bar" style="width: ${data.progress_percentage}%">${data.progress_percentage}%</div>
                    </div>
                `;
            }
        }
        
        async function loadSubmissions() {
            const response = await fetch('/api/student/submissions', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (response.ok) {
                const submissions = await response.json();
                document.getElementById('submissionsList').innerHTML = submissions.map(s => `
                    <div class="border-bottom py-2">
                        <strong>${s.assignment_title}</strong><br>
                        Grade: ${s.grade || 'Not graded'}<br>
                        <small>${s.feedback || 'No feedback'}</small>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
