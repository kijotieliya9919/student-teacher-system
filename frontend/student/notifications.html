<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/supabase-init.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info">
        <div class="container">
            <a class="navbar-brand" href="#">My Notifications</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/student/dashboard.html">Dashboard</a>
                <a class="nav-link text-white" href="/student/assignments.html">Assignments</a>
                <a class="nav-link text-white" href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h3>Notifications</h3>
        <div id="notificationsList"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let token = null;
        (async () => {
            const sb = await requireAuth();
            token = (await sb.auth.getSession()).data.session?.access_token;
        })();
        
        async function loadNotifications() {
            const response = await fetch('/api/student/notifications', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (response.ok) {
                const notifications = await response.json();
                const container = document.getElementById('notificationsList');
                if (notifications.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">No notifications yet.</div>';
                    return;
                }
                container.innerHTML = notifications.map(n => `
                    <div class="card mb-3 ${n.is_read ? '' : 'border-primary'}">
                        <div class="card-body">
                            <h6 class="card-title">${n.subject}</h6>
                            <p class="card-text">${n.message}</p>
                            <small class="text-muted">${new Date(n.created_at).toLocaleString()}</small>
                            ${n.is_read ? '' : '<span class="badge bg-primary">New</span>'}
                        </div>
                    </div>
                `).join('');
            }
        }
        
        loadNotifications();
    </script>
</body>
</html>
